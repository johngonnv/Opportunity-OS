packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

allowBuilds:
  esbuild: false
  puppeteer: true

autoInstallPeers: false

catalog:
  '@replit/vite-plugin-cartographer': ^0.5.1
  '@replit/vite-plugin-dev-banner': ^0.1.1
  '@replit/vite-plugin-runtime-error-modal': ^0.0.6
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': 25.3.5
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: 4.21.0
  vite: ^7.3.2
  zod: ^3.25.76

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@replit/*'
  - stripe-replit-sync

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - puppeteer
  - unrs-resolver

overrides:
  # ── Security vulnerability fixes ─────────────────────────────────────────────
  # @xmldom/xmldom: GHSA-2v35, GHSA-f6ww, GHSA-j759, GHSA-wh4c, GHSA-x6wf (HIGH x5)
  '@xmldom/xmldom': '0.9.10'
  # path-to-regexp: GHSA-j3q9 (HIGH), GHSA-27v5 (MEDIUM)
  path-to-regexp: '8.4.2'
  # fast-uri: GHSA-q3j6 (HIGH), GHSA-v39h (HIGH)
  fast-uri: '3.1.2'
  # picomatch: GHSA-c2c7 (HIGH), GHSA-3v7f (MEDIUM) — covers 2.x and 4.x
  picomatch: '4.0.4'
  # js-cookie: GHSA-qjx8 (HIGH)
  js-cookie: '3.0.7'
  # lodash: GHSA-r5fr (HIGH), GHSA-f23m (MEDIUM)
  lodash: '4.18.1'
  # uuid: GHSA-w5hq (HIGH) — affects 3.x, 7.x, 8.x, 9.x; fixed in v10+
  uuid: '>=10.0.0'
  # yaml: GHSA-48c2 (MEDIUM)
  yaml: '2.9.0'
  # ws: GHSA-58qx (MEDIUM)
  ws: '8.21.0'
  # fast-xml-builder: GHSA-5wm8 (MEDIUM)
  fast-xml-builder: '1.2.0'
  # fast-xml-parser: GHSA-gh4j (MEDIUM)
  fast-xml-parser: '5.8.0'
  # brace-expansion: GHSA-f886 (MEDIUM) — version-specific patches per major
  'brace-expansion@^1': '1.1.14'
  'brace-expansion@^2': '2.0.3'
  'brace-expansion@^5': '5.0.6'
  # qs: GHSA-q8mj (MEDIUM)
  qs: '6.15.2'
  # postcss: GHSA-qx2v (MEDIUM) — covers 8.4.x and 8.5.x
  postcss: '8.5.15'
  # ip-address: GHSA-v2v4 (MEDIUM)
  ip-address: '10.2.0'
  # basic-ftp: GHSA-rp42 (HIGH >=5.3.0), GHSA-rpmf (HIGH >=5.3.1)
  basic-ftp: '5.3.1'
  # @tootallnate/once: GHSA-vpq2 (LOW >=2.0.1)
  '@tootallnate/once': '2.0.1'
  # ── Existing overrides ────────────────────────────────────────────────────────
  '@esbuild-kit/esm-loader': npm:tsx@^4.21.0
  '@expo/ngrok-bin>@expo/ngrok-bin-darwin-arm64': '-'
  '@expo/ngrok-bin>@expo/ngrok-bin-darwin-x64': '-'
  '@expo/ngrok-bin>@expo/ngrok-bin-freebsd-ia32': '-'
