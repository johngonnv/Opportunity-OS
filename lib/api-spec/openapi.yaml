openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Opportunity OS CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: workspace
    description: Workspace management
  - name: contacts
    description: Contact management
  - name: organizations
    description: Organization management
  - name: businessCards
    description: Business card operations
  - name: tasks
    description: Task management
  - name: activities
    description: Activity logging
  - name: opportunities
    description: Opportunity management
  - name: pipelines
    description: Pipeline management
  - name: notes
    description: Notes management
  - name: tags
    description: Tag management
  - name: reports
    description: Reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspace:
    get:
      operationId: getWorkspace
      tags: [workspace]
      summary: Get current workspace
      responses:
        "200":
          description: Workspace info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    post:
      operationId: createWorkspace
      tags: [workspace]
      summary: Create workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contacts
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: organizationId
          schema:
            type: string
        - in: query
          name: tagId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactListResponse"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get contact by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateContact
      tags: [contacts]
      summary: Update contact
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete contact
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List organizations
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: organizationType
          schema:
            type: string
        - in: query
          name: tagId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    delete:
      operationId: deleteOrganization
      tags: [organizations]
      summary: Delete organization
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /business-cards:
    get:
      operationId: listBusinessCards
      tags: [businessCards]
      summary: List business cards
      parameters:
        - in: query
          name: processingStatus
          schema:
            type: string
        - in: query
          name: reviewStatus
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of business cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessCardListResponse"
    post:
      operationId: createBusinessCard
      tags: [businessCards]
      summary: Upload business card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessCardRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessCard"

  /business-cards/{id}:
    get:
      operationId: getBusinessCard
      tags: [businessCards]
      summary: Get business card by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Business card details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessCard"
    put:
      operationId: updateBusinessCard
      tags: [businessCards]
      summary: Update business card
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessCardRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessCard"

  /business-cards/{id}/parse:
    post:
      operationId: parseBusinessCard
      tags: [businessCards]
      summary: Trigger OCR parsing on a business card
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Parsed result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessCard"

  /business-cards/{id}/approve:
    post:
      operationId: approveBusinessCard
      tags: [businessCards]
      summary: Approve business card and create contact
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveBusinessCardRequest"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveBusinessCardResponse"

  /business-cards/{id}/reject:
    post:
      operationId: rejectBusinessCard
      tags: [businessCards]
      summary: Reject business card
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessCard"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: priority
          schema:
            type: string
        - in: query
          name: contactId
          schema:
            type: string
        - in: query
          name: organizationId
          schema:
            type: string
        - in: query
          name: opportunityId
          schema:
            type: string
        - in: query
          name: dueFilter
          schema:
            type: string
            enum: [today, overdue, upcoming]
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List activities
      parameters:
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: contactId
          schema:
            type: string
        - in: query
          name: organizationId
          schema:
            type: string
        - in: query
          name: opportunityId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityListResponse"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Log activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{id}:
    put:
      operationId: updateActivity
      tags: [activities]
      summary: Update activity
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActivityRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
    delete:
      operationId: deleteActivity
      tags: [activities]
      summary: Delete activity
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /opportunities:
    get:
      operationId: listOpportunities
      tags: [opportunities]
      summary: List opportunities
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: pipelineId
          schema:
            type: string
        - in: query
          name: pipelineStageId
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of opportunities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityListResponse"
    post:
      operationId: createOpportunity
      tags: [opportunities]
      summary: Create opportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpportunityRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Opportunity"

  /opportunities/{id}:
    get:
      operationId: getOpportunity
      tags: [opportunities]
      summary: Get opportunity by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Opportunity details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityDetail"
    put:
      operationId: updateOpportunity
      tags: [opportunities]
      summary: Update opportunity
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOpportunityRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Opportunity"
    delete:
      operationId: deleteOpportunity
      tags: [opportunities]
      summary: Delete opportunity
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /pipelines:
    get:
      operationId: listPipelines
      tags: [pipelines]
      summary: List pipelines with stages
      responses:
        "200":
          description: List of pipelines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineListResponse"

  /notes:
    post:
      operationId: createNote
      tags: [notes]
      summary: Create note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    put:
      operationId: updateNote
      tags: [notes]
      summary: Update note
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete note
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List tags
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
    post:
      operationId: createTag
      tags: [tags]
      summary: Create tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"

  /reports/dashboard:
    get:
      operationId: getDashboardStats
      tags: [reports]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /reports/activities:
    get:
      operationId: getActivityReport
      tags: [reports]
      summary: Get activity report
      parameters:
        - in: query
          name: days
          schema:
            type: integer
      responses:
        "200":
          description: Activity report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityReport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    User:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - createdAt

    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        industryFocus:
          type: string
          nullable: true
        ownerUserId:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - ownerUserId
        - createdAt

    CreateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
        industryFocus:
          type: string
      required:
        - name

    Contact:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        organizationId:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        fullName:
          type: string
        title:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        mobile:
          type: string
          nullable: true
        linkedinUrl:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        status:
          type: string
        notesText:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        organization:
          $ref: "#/components/schemas/OrganizationSummary"
          nullable: true
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
      required:
        - id
        - workspaceId
        - fullName
        - status
        - createdAt
        - updatedAt

    ContactDetail:
      allOf:
        - $ref: "#/components/schemas/Contact"
        - type: object
          properties:
            activities:
              type: array
              items:
                $ref: "#/components/schemas/Activity"
            tasks:
              type: array
              items:
                $ref: "#/components/schemas/Task"
            notes:
              type: array
              items:
                $ref: "#/components/schemas/Note"
            opportunities:
              type: array
              items:
                $ref: "#/components/schemas/OpportunitySummary"

    ContactListResponse:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - contacts
        - total
        - page
        - limit

    CreateContactRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        title:
          type: string
        department:
          type: string
        email:
          type: string
        phone:
          type: string
        mobile:
          type: string
        linkedinUrl:
          type: string
        source:
          type: string
        organizationId:
          type: string
        notesText:
          type: string
        tagIds:
          type: array
          items:
            type: string
      required:
        - fullName

    UpdateContactRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        title:
          type: string
        department:
          type: string
        email:
          type: string
        phone:
          type: string
        mobile:
          type: string
        linkedinUrl:
          type: string
        source:
          type: string
        status:
          type: string
        organizationId:
          type: string
        notesText:
          type: string
        tagIds:
          type: array
          items:
            type: string

    OrganizationSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        organizationType:
          type: string
        industry:
          type: string
          nullable: true
      required:
        - id
        - name
        - organizationType

    Organization:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        name:
          type: string
        legalName:
          type: string
